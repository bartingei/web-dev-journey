<!DOCTYPE html>

    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

                <div><button type="submit" value="Loginbutton">login<br><br></div>

                </ul>

    </div>
    <script>
        document.getElementById("loginbutton").addEventListener('click', function(){
            alert('button clicked');
        });
    </script>
