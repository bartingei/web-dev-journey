<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var input = '+';
        var symbol;
   

        switch (symbol) {
            case '+':
            symbol = '+';
            break;

            case '-':
            symbol = '-';
            break;

            case '%':
            symbol = '%';
            break;

            case '*':
            symbol = '*';
            break;

            case '/':
            symbol = '/';
            break;

            default:
            symbol = "invalid character";
            break;
        }

        document.write("symbol is: 👉 " + input);

    </script>
</body>
</html>
